<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Script’s</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#050506;
  color:white;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* glow */
.bg-glow{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#ffd70055,transparent 60%);
  filter:blur(80px);
  top:-150px;
  left:-150px;
  z-index:0;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,0.15);
  z-index:10;
}

.logo{
  font-weight:bold;
  color:#ffd700;
}

.nav a{
  color:#fff3a0;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#ffd700,#ffb300,#fff3a0);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  opacity:0.7;
  margin-top:10px;
}

.btn{
  margin-top:25px;
  padding:14px 32px;
  background:linear-gradient(90deg,#ffd700,#ffb300);
  border:none;
  color:#111;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px #ffd700;
}

/* FEATURES */
.panel{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:60px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
}

.card{
  width:260px;
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.15);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 20px #ffd70033;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.card h3{
  color:#ffd700;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 10px #00ff88, 0 0 20px #00ff88;
}

/* ===== SCRIPTS ===== */
#scripts{
  padding:120px 20px;
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  perspective:1000px;
  position:relative;
  z-index:2;
}

.script-card{
  width:300px;
  padding:15px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.2);
  text-align:center;
  position:relative;
  overflow:visible;
}

/* ===== IMAGEN 3D REAL ===== */
.script-card img{
  width:110%;
  margin-top:-50px;
  border-radius:18px;
  box-shadow:0 25px 50px rgba(0,0,0,0.7);
  filter:blur(2px);
  transition:0.25s ease;
  transform-style:preserve-3d;
  will-change:transform, filter;
}

/* BOTÓN */
.get-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ffd700,#ffb300);
  color:#111;
  font-weight:bold;
  cursor:pointer;
}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<canvas id="particles"></canvas>

<div class="topbar">
  <div class="logo">King’s Script’s</div>
  <div class="nav">
    <a href="#home">Home</a>
    <a href="#scripts">Scripts</a>
    <a href="#status">Status</a>
    <a href="#" onclick="window.location.href='https://discord.com'">Key</a>
  </div>
</div>

<div class="hero" id="home">
  <h1>King’s Script’s</h1>
  <p>Fast • Secure • Undetected UI Hub</p>

  <button class="btn" onclick="document.getElementById('scripts').scrollIntoView({behavior:'smooth'})">
    Obtener Scripts
  </button>
</div>

<div class="panel" id="status">

  <div class="card">
    <div class="card-header">
      <h3>⚡ Fast Inject</h3>
      <div class="status-dot"></div>
    </div>
    <p>Optimizado para ejecución rápida en mobile y PC.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>🔑 Key System</h3>
      <div class="status-dot"></div>
    </div>
    <p>Sistema de keys dinámico con seguridad HWID.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>🛡️ Secure UI</h3>
      <div class="status-dot"></div>
    </div>
    <p>Interfaz limpia con protección anti-crash.</p>
  </div>

</div>

<!-- SCRIPTS -->
<div id="scripts">

  <div class="script-card">
    <img src="https://via.placeholder.com/300x180?text=Hub+Farm">
    <h3>Hub Farm</h3>
    <button class="get-btn">Obtener</button>
  </div>

  <div class="script-card">
    <img src="https://i.imgur.com/ATEbR9b.png">
    <h3>Hub Main</h3>
    <button class="get-btn">Obtener</button>
  </div>

</div>

<script>
/* ===== PARTICLES ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let p = [];

for(let i=0;i<70;i++){
  p.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  p.forEach(e=>{
    e.x += e.dx;
    e.y += e.dy;

    if(e.x<0||e.x>canvas.width) e.dx*=-1;
    if(e.y<0||e.y>canvas.height) e.dy*=-1;

    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fillStyle="#ffd700";
    ctx.fill();
  });

  requestAnimationFrame(loop);
}

loop();

/* ===== 3D SOLO IMAGEN ===== */
document.querySelectorAll(".script-card img").forEach(img=>{

  img.addEventListener("mousemove",(e)=>{
    const rect = img.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = (y - centerY) / 10;
    const rotateY = (x - centerX) / 10;

    img.style.filter = "blur(0px)";
    img.style.transform =
      `perspective(1000px)
       rotateX(${-rotateX}deg)
       rotateY(${rotateY}deg)
       scale(1.25)
       translateZ(60px)`;
  });

  img.addEventListener("mouseleave",()=>{
    img.style.filter = "blur(2px)";
    img.style.transform =
      "perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)";
  });

});
</script>

</body>
</html>
